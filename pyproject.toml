[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",  # line too long — handled by formatter
    "F401",  # unused imports — CDK constructs often imported for side effects
]

[tool.ruff.lint.per-file-ignores]
"lambda/*" = ["E402"]
